<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEXUS COLLECTIVE — Verifying</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Callback-specific styles */
    body { overflow: hidden; }
    #status-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.5rem;
      background: var(--dark);
      z-index: 10;
    }
    .bg-img { filter: brightness(0.25) saturate(1.2); }

    .spinner {
      width: 48px; height: 48px;
      border: 2px solid rgba(200,0,255,0.15);
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      filter: drop-shadow(0 0 8px rgba(200,0,255,0.6));
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status-msg {
      font-family: var(--font-display);
      font-size: 1.8rem;
      letter-spacing: 0.3em;
      color: var(--text);
      text-shadow: 0 0 20px rgba(200,0,255,0.5);
    }

    .status-sub {
      font-family: var(--font-body);
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div class="bg-img" aria-hidden="true"></div>
  <div class="bg-vignette" aria-hidden="true"></div>

  <div id="status-screen">
    <div class="spinner" id="spinner"></div>
    <p class="status-msg" id="status-msg">VERIFYING</p>
    <p class="status-sub"  id="status-sub">Hang tight…</p>
  </div>

  <script src="js/callback.js"></script>
</body>
</html>
